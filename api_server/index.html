<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق تحميل الفيديوهات الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f3f4f6; }
        .loader { border-top-color: #3b82f6; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden mt-10">
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-6 text-center">
            <h1 class="text-3xl font-bold text-white mb-2"><i class="fas fa-cloud-download-alt ml-2"></i>محمل الفيديوهات Pro</h1>
            <p class="text-blue-100">حمل من تيك توك، يوتيوب، انستجرام بأعلى جودة</p>
        </div>

        <!-- Input Section -->
        <div class="p-6">
            <div class="relative">
                <input type="text" id="urlInput" placeholder="ضع رابط الفيديو هنا..." 
                    class="w-full pl-4 pr-12 py-4 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all text-lg outline-none">
                <button onclick="fetchVideoInfo()" id="searchBtn"
                    class="absolute left-2 top-2 bottom-2 bg-blue-600 hover:bg-blue-700 text-white px-6 rounded-lg font-bold transition-colors">
                    بحث <i class="fas fa-search mr-1"></i>
                </button>
            </div>

            <!-- Loading Spinner -->
            <div id="loading" class="hidden flex flex-col items-center justify-center py-10">
                <div class="loader ease-linear rounded-full border-4 border-gray-200 h-12 w-12 mb-4"></div>
                <p class="text-gray-500 font-medium">جاري جلب معلومات الفيديو...</p>
            </div>

            <!-- Error Message -->
            <div id="errorMsg" class="hidden mt-4 bg-red-100 border-r-4 border-red-500 text-red-700 p-4 rounded-lg">
                <p class="font-bold"><i class="fas fa-exclamation-circle ml-2"></i>خطأ!</p>
                <p id="errorText" class="text-sm mt-1"></p>
            </div>

            <!-- Results Section -->
            <div id="results" class="hidden mt-8 animate-fade-in">
                <div class="flex flex-col md:flex-row gap-6">
                    <!-- Thumbnail -->
                    <div class="w-full md:w-1/3">
                        <img id="videoThumb" src="" alt="Thumbnail" class="w-full rounded-xl shadow-md object-cover aspect-video">
                        <div class="mt-4 text-center">
                            <h3 id="videoTitle" class="font-bold text-gray-800 line-clamp-2"></h3>
                            <p id="videoDuration" class="text-sm text-gray-500 mt-1"></p>
                        </div>
                    </div>

                    <!-- Download Options -->
                    <div class="w-full md:w-2/3 flex flex-col gap-3" id="downloadButtons">
                        <h3 class="font-bold text-gray-700 mb-2 border-b pb-2">اختر الجودة للتحميل:</h3>
                        <!-- Buttons will be injected here via JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchVideoInfo() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return alert('الرجاء إدخال رابط صحيح');

            // UI States
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('searchBtn').disabled = true;

            try {
                const response = await fetch('/api/v1/info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'حدث خطأ غير معروف');
                }

                // Populate Data
                document.getElementById('videoThumb').src = data.thumbnail || 'https://via.placeholder.com/300x200?text=No+Image';
                document.getElementById('videoTitle').textContent = data.title || 'بدون عنوان';
                document.getElementById('videoDuration').textContent = 'المدة: ' + (data.duration || 'غير معروف');

                // Generate Buttons
                const buttonsContainer = document.getElementById('downloadButtons');
                buttonsContainer.innerHTML = ''; // Clear old buttons

                // Original Quality Button
                buttonsContainer.innerHTML += `
                    <a href="/api/v1/download?url=${encodeURIComponent(url)}&format_id=best_quality" 
                       class="flex items-center justify-between bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white p-4 rounded-xl shadow-md transition-transform transform hover:scale-[1.02]">
                        <span class="font-bold"><i class="fas fa-star text-yellow-300 ml-2"></i>الملف الأصلي (أعلى جودة)</span>
                        <i class="fas fa-download"></i>
                    </a>
                `;

                // Audio Button
                buttonsContainer.innerHTML += `
                    <a href="/api/v1/download?url=${encodeURIComponent(url)}&is_audio=true" 
                       class="flex items-center justify-between bg-gray-800 hover:bg-gray-900 text-white p-4 rounded-xl shadow-md transition-transform transform hover:scale-[1.02]">
                        <span class="font-bold"><i class="fas fa-music text-pink-400 ml-2"></i>تحميل كصوت (MP3)</span>
                        <i class="fas fa-download"></i>
                    </a>
                `;

                // Filter unique resolutions
                let addedRes = new Set();
                data.formats.forEach(f => {
                    if (!addedRes.has(f.resolution)) {
                        addedRes.add(f.resolution);
                        let sizeStr = f.filesize > 0 ? `(${(f.filesize / 1048576).toFixed(1)} MB)` : '';
                        
                        buttonsContainer.innerHTML += `
                            <a href="/api/v1/download?url=${encodeURIComponent(url)}&format_id=${f.format_id}" 
                               class="flex items-center justify-between bg-white border-2 border-gray-200 hover:border-blue-500 hover:bg-blue-50 text-gray-700 p-3 rounded-xl transition-colors">
                                <span class="font-medium"><i class="fas fa-video text-blue-500 ml-2"></i>دقة ${f.resolution} <span class="text-sm text-gray-400">${sizeStr}</span></span>
                                <i class="fas fa-arrow-down text-gray-400"></i>
                            </a>
                        `;
                    }
                });

                document.getElementById('results').classList.remove('hidden');

            } catch (error) {
                document.getElementById('errorText').textContent = error.message;
                document.getElementById('errorMsg').classList.remove('hidden');
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('searchBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
