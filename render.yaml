services:
  # 1. خدمة الويب (موقع الويب وواجهة برمجة التطبيقات)
  - type: web
    name: video-downloader-api
    env: python
    rootDir: api_server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  # 2. خدمة البوت (تعمل في الخلفية دائماً)
  - type: worker
    name: video-downloader-bot
    env: python
    rootDir: telegram_bot
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: BOT_TOKEN
        sync: false # سيُطلب منك إدخال التوكن يدوياً في لوحة تحكم Render
